<!DOCTYPE html>
<html lang="en">
<head>
  <title>Country Names Translation and Sorting Tool</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    
</head>
<script>
    //egypt, canada, ghana, mali, iraq, iran, syria, libya, and qatar
var enar_list=[];
var ar_list=[];  
var order_dict={}
function $$(el_id){
    return document.getElementById(el_id)
}

function get_vals(class_name){
    val_dict={}
    elements=document.getElementsByClassName(class_name)
    used_names=[] //to address radio buttons, where inputs have the same names
    for (el in elements){
        cur_el=elements[el]
        el_name=cur_el.name
        el_value=cur_el.value
        if (el_name==null || el_name==undefined) continue
        if (el_value==null || el_value==undefined) continue
        if (used_names.indexOf(el_name)>-1) continue
        
        if (cur_el.type=="radio"){
            used_names.push(el_name)
            var radios = document.getElementsByName(el_name);
            for (rd in radios){
                //check if the radio button is of the same class
                cur_rd=radios[rd]
                if (cur_rd.checked) val_dict[el_name]=cur_rd.value
            }
        }
        else if (cur_el.type=="checkbox") val_dict[el_name]=cur_el.checked
        else val_dict[el_name]=el_value
    }
    return val_dict
}

function split_2d(txt){
    list_2d=[]
    lines=txt.split("\n")
    for (li in lines){
        cur_line=$.trim(lines[li]) 
        if (cur_line=="") continue
        line_split=cur_line.split("\t")
        line_items=[]
        for (ls in line_split) line_items.push($.trim(line_split[ls]))
        list_2d.push(line_items)
    }
    return list_2d
}   
    
function init(){
    //alert("Hello")
    cur_val_dict=get_vals("frm1")
    console.log(cur_val_dict)
    enar_fname="official-translation-dec2019.tsv"
    ar_fname="official-order-dec2019.tsv"
    //text_fname="txt/arabic_data.json"
    enar_fname="txt/enar_list.tsv"
    ar_fname="txt/arlist.tsv"
    fetch(enar_fname)
      .then(function(res){ return res.text(); })
      .then(function(data){
        enar_list=split_2d(data)
        enar_list.sort(function(a, b){return b[1].length - a[1].length;});
        console.log(enar_list)
        if (ar_list.length>0) ready()
        
      })  
    fetch(ar_fname)
      .then(function(res){ return res.text(); })
      .then(function(data){
        ar_list=split_2d(data)
//        enar_list.sort(function(a, b){return b[1].length - a[1].length;});
        console.log(ar_list)
        for (ar in ar_list) order_dict[ar_list[ar][1]]=Number(ar)
        console.log(order_dict)
        if (enar_list.length>0) ready()
      })       
}   

function ready(){
    $$("submit_btn").hidden=false;
}    
    
function submit(){
    cur_val_dict=get_vals("frm1")
    console.log(cur_val_dict)  
    input_str=cur_val_dict.countries
    if (input_str=="") return
    input_str_lower=input_str.toLowerCase()
    console.log(input_str)
    found_ar=[]
    for (ea in enar_list){
        var [ar0,en0]=enar_list[ea]
        //console.log(en0,ar0)
        en0_lower=en0.toLowerCase()
        //console.log(input_str_lower,en0)
        if (input_str_lower.includes(en0_lower)){
            console.log(en0,ar0)
            found_ar.push(ar0)
            filler= new Array(en0_lower.length + 1).join("-" );
            input_str_lower=input_str_lower.replace(en0_lower,filler)
        }
    }
    console.log(found_ar)
    $$("n_countries").innerHTML=""+found_ar.length
    separator=""
    if (cur_val_dict.comma) separator+="،"
    if (cur_val_dict.semicolon) separator+="؛"
    if (cur_val_dict.waaw) separator+=" و"
    else separator+=" "
    
    if (cur_val_dict.columns) separator="<br>"
    
    if (cur_val_dict.sort=="true"){
        found_ar.sort(function(a, b){return order_dict[a] - order_dict[b];})
    }
    
    results_str=found_ar.join(separator)
    $$("results").innerHTML=results_str
    $$("validation").innerHTML=input_str_lower
    //$$("main").hidden=true;
    $("#main").hide()
    //$$("results").hidden=false;
    console.log(input_str_lower)
}

function show_main(){
    $("#main").show()
    window.scrollTo(0, 0);
   //$$("main").hidden=false; 
}    

function copy2clipboard(){
	//alert("Hello!")
	containerid="results"
    if (document.selection) { // IE
        var range = document.body.createTextRange();
        range.moveToElementText(document.getElementById(containerid));
        range.select();
    } else if (window.getSelection) {
        var range = document.createRange();
        range.selectNode(document.getElementById(containerid));
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
    }	
    document.execCommand("copy");
    msg=document.getElementById("message")
    msg.innerHTML="copied successfully!"
    msg.style.color="DarkGreen"


}
</script>
    
<body onload="init()">

<div class="text-center">
  <h1>Country Names</h1>
  <p>Translation and Sorting Tool (English > Arabic)</p> 
</div>
  
<div class="container">
  <div class="row">
    <div class="col-sm-2">
<!--
      <h3>Column 1</h3>
      <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit...</p>
      <p>Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris...</p>
-->
    </div>
    <div id="main" class="col-sm-8 text-center">
        <div class="form-group">
<!--          <label for="comment">Enter Country Names below:</label>-->
          <textarea class="frm1 form-control" name="countries" rows="5" id="comment" placeholder="Enter country names here"></textarea>
        </div>
        <div class="form-check-inline">
          <label class="form-check-label">
            <input id="radio_sort" type="radio" class="frm1 form-check-input" name="sort" value="true" checked>Sort according to Arabic alphabet
          </label>
        </div>
        <div class="form-check-inline">
          <label class="form-check-label">
            <input type="radio" class="frm1 form-check-input" name="sort" value="false">Keep the original order
          </label>
        </div>
        <br>
        Display output:<br> 
        <div class="form-check-inline">
          <label class="form-check-label">
            <input type="checkbox" name="columns" class="frm1 form-check-input" value="">In columns
          </label>
        </div>
        <div class="form-check-inline">
          <label class="form-check-label">
            <input type="checkbox" name="comma" class="frm1 form-check-input" value="" checked>Separated by comma
          </label>
        </div>
        <div class="form-check-inline">
          <label class="form-check-label">
            <input type="checkbox" name="semicolon" class="frm1 form-check-input" value="">Separated by semicolon
          </label>
        </div>
        <div class="form-check-inline">
          <label class="form-check-label">
            <input type="checkbox" name="waaw" class="frm1 form-check-input" value="" checked>Separated by waaw
          </label>
        </div>
        <button id="submit_btn" onclick="submit()" type="button" class="btn btn-primary btn-block" style="margin: 10px;" hidden>Translate</button>
        



        
    </div>
    <div class="col-sm-2">
<!--
      <h3>Column 3</h3>        
      <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit...</p>
      <p>Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris...</p>
-->
    </div>
  </div>
    
    <div class="row">
        <div class="col-sm-2"></div>
        <div class="col-sm-8 text-center">
            <h1>Result </h1>
            <p>Number of Countries found: <span id="n_countries">0</span> <button class="btn btn-sm btn-info" onclick="copy2clipboard()">Copy to clipboard</button><br><span id="message"></span></p>
            
            <div id="results"></div>
            <hr>
            <h5>Validation:</h5>
            <div id="validation"></div>
            <button class="btn btn-sm btn-info" onclick="show_main()">Back</button>
        </div>
        <div class="col-sm-2"></div>
        
    </div>
</div>

</body>
</html>
